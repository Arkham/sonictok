name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # feature variations
      - run: cargo build -p sonictok --no-default-features
      - run: cargo build -p sonictok --features embed-data
      # stable C ABI: build the static lib, compile + run the C smoke test
      - run: cargo run -p xtask -- test-cabi
      - uses: EmbarkStudios/cargo-deny-action@v2

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the components rust-toolchain.toml pins, so rustup doesn't try to
      # auto-add them mid-maturin-build (which conflicts on the runner).
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      # maturin develop installs into an active virtualenv — create one and put it
      # on PATH + VIRTUAL_ENV so the following steps use it.
      - run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - run: pip install maturin pytest
      - run: maturin develop --release
        working-directory: bindings/python
      - run: python -m pytest bindings/python/tests -q
        env:
          SONICTOK_DATA: ${{ github.workspace }}/data
